name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required to push to GitHub Container Registry

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flash-sale-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/flash-sale-api:latest

      - name: Image pushed
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository_owner }}/flash-sale-api:${{ github.sha }}"
          echo "Deploy this image to your K8s cluster by updating the image tag in k8s/base/deployment.yaml"
