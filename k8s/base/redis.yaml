# Redis for Minikube (replaces Memorystore when running locally)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: flash-sale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: flash-sale
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
