apiVersion: v1
kind: Service
metadata:
  name: flash-sale-api
  namespace: flash-sale
spec:
  # LoadBalancer creates an external IP.
  # In Minikube, run `minikube tunnel` to get a localhost IP.
  # In GKE, this creates a GCP Network Load Balancer automatically.
  type: LoadBalancer
  selector:
    app: flash-sale-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
