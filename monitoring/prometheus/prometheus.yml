global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "flash-sale-api"
    static_configs:
      - targets: ["app:8000"]  # Docker Compose service name

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
